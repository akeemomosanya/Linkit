<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Linkit — My Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Epilogue:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--bg2:#0b0e1a;--bg3:#10142b;
  --surface:rgba(255,255,255,0.04);--surface-h:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#4f6ef7;--accent2:#a78bfa;--accent3:#22d3a5;
  --text:#eef0ff;--text2:#8892b0;--text3:#3d4a6b;
  --danger:#ff5c7c;--r:12px;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.5}
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.b1{width:500px;height:500px;background:rgba(79,110,247,0.08);top:-150px;left:-100px}
.b2{width:400px;height:400px;background:rgba(167,139,250,0.06);bottom:-80px;right:-80px}

.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:12px;
  padding:0 2rem;height:62px;
  background:rgba(6,8,15,0.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.nav-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center}
.nav-logo svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round}
.nav-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text)}

.topbar-search{
  flex:1;max-width:380px;
  position:relative;
}
.topbar-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round}
.topbar-search input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px 9px 33px;
  color:var(--text);font-family:'Epilogue',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.topbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,110,247,0.18)}
.topbar-search input::placeholder{color:var(--text3)}

.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}

.btn-add-nav{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:8px;color:white;
  font-family:'Epilogue',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:opacity .2s;white-space:nowrap;
}
.btn-add-nav:hover{opacity:.88}
.btn-add-nav svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round}

.avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:white;flex-shrink:0;
}

.btn-signout{
  padding:7px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text2);font-family:'Epilogue',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-signout:hover{border-color:var(--border2);color:var(--text)}

.body{max-width:1100px;margin:0 auto;padding:2rem;position:relative;z-index:1}

.page-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:2rem;
  animation:fadeUp .4s ease both;
}
.page-header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px}
.page-header p{color:var(--text2);font-size:13px;margin-top:3px}
.link-count{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:600;
  background:var(--surface);border:1px solid var(--border);
  border-radius:100px;padding:4px 12px;color:var(--text2);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:16px;
  animation:fadeUp .4s .1s ease both;
}

.link-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .2s,transform .2s;
  cursor:pointer;
}
.link-card:hover{border-color:var(--border2);transform:translateY(-3px)}

.card-banner{
  height:100px;display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;position:relative;flex-shrink:0;
}
.card-banner::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(to bottom,transparent,var(--bg2));
}

.card-body{padding:14px 16px 0;flex:1}
.card-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-url{font-size:12px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.card-note{font-size:13px;color:var(--text2);line-height:1.5;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;min-height:20px}

.card-actions{
  display:flex;border-top:1px solid var(--border);
  margin-top:auto;
}
.ca-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:10px 4px;background:none;border:none;
  color:var(--text2);font-family:'Epilogue',sans-serif;
  font-size:12px;cursor:pointer;transition:all .15s;
  border-right:1px solid var(--border);
}
.ca-btn:last-child{border-right:none}
.ca-btn:hover{background:var(--surface-h);color:var(--text)}
.ca-btn.del:hover{color:var(--danger)}
.ca-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}

.empty{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6rem 2rem;text-align:center;
  color:var(--text2);
}
.empty-emoji{font-size:3.5rem;margin-bottom:1rem;opacity:.35}
.empty h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:.5rem}
.empty p{font-size:14px;max-width:300px;font-weight:300}
.empty-btn{
  margin-top:1.5rem;padding:11px 24px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:8px;color:white;
  font-family:'Epilogue',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:opacity .2s;
}
.empty-btn:hover{opacity:.88}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(6,8,15,0.88);backdrop-filter:blur(8px);
  z-index:200;display:none;align-items:center;justify-content:center;padding:1.5rem;
}
.overlay.open{display:flex}
.modal{
  width:100%;max-width:420px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:2rem;
  animation:fadeUp .3s ease both;
}
.modal h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field input,.field textarea{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:11px 14px;color:var(--text);
  font-family:'Epilogue',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;resize:vertical;
}
.field textarea{min-height:80px}
.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,0.18)}
.field input::placeholder,.field textarea::placeholder{color:var(--text3)}
.modal-alert{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:none}
.modal-alert.error{background:rgba(255,92,124,0.1);border:1px solid rgba(255,92,124,0.25);color:#ff8fa6;display:block}
.modal-btns{display:flex;gap:10px;margin-top:1.25rem}
.btn-cancel{flex:1;padding:11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:'Epilogue',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}
.btn-save{flex:1;padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);color:white;font-family:'Epilogue',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s}
.btn-save:hover{opacity:.88}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

.toast{
  position:fixed;bottom:1.75rem;right:1.75rem;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:11px 18px;
  font-size:13px;color:var(--text);
  transform:translateY(60px);opacity:0;
  transition:all .3s ease;z-index:300;
  display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(34,211,165,0.3)}
.toast.err{border-color:rgba(255,92,124,0.3)}

.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.25);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>


<header class="topbar">
  <a href="index.html" class="nav-brand">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    </div>
    <span class="nav-name">Linkit</span>
  </a>

  <div class="topbar-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search your links…" oninput="onSearch()"/>
  </div>

  <div class="topbar-right">
    <button class="btn-add-nav" onclick="openModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add link
    </button>
    <div class="avatar" id="user-avatar">?</div>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="body">
  <div class="page-header">
    <div>
      <h1>My Links</h1>
      <p id="subtitle">Loading your links…</p>
    </div>
    <span class="link-count" id="link-count" style="display:none"></span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Save a link</h2>
    <div id="modal-alert" class="modal-alert"></div>
    <div class="field"><label>URL *</label><input type="url" id="m-url" placeholder="https://…"/></div>
    <div class="field"><label>Name</label><input type="text" id="m-name" placeholder="Give it a name"/></div>
    <div class="field"><label>Note</label><textarea id="m-note" placeholder="Why are you saving this?"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveLink()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://linkit-1-4xd8.onrender.com';
let token = localStorage.getItem('ls_token');
let allLinks = [];
let editingId = null;

if (!token) location.href = 'auth.html';

const palettes = [
  {bg:'linear-gradient(135deg,#1a1f3e,#2d1b69)',emoji:'🔗'},
  {bg:'linear-gradient(135deg,#0d2b1a,#0b4d2e)',emoji:'📗'},
  {bg:'linear-gradient(135deg,#2b1a0d,#5c2e00)',emoji:'📙'},
  {bg:'linear-gradient(135deg,#2b0d1a,#6b1a3a)',emoji:'📕'},
  {bg:'linear-gradient(135deg,#0d1f2b,#0a3a5c)',emoji:'📘'},
  {bg:'linear-gradient(135deg,#1f1a2b,#4a2070)',emoji:'📓'},
  {bg:'linear-gradient(135deg,#1a2b1a,#1a5c2e)',emoji:'🌿'},
  {bg:'linear-gradient(135deg,#2b2b0d,#5c4a00)',emoji:'⭐'},
];

const domainEmojis = {
  'github.com':'🐙','youtube.com':'▶️','twitter.com':'🐦','x.com':'🐦',
  'reddit.com':'🟠','figma.com':'🎨','notion.so':'📝','medium.com':'📖',
  'dev.to':'👾','stackoverflow.com':'💬','linkedin.com':'💼',
  'google.com':'🔍','vercel.com':'▲','netflix.com':'🎬','spotify.com':'🎵',
  'amazon.com':'🛒','apple.com':'🍎','wikipedia.org':'📚','instagram.com':'📸',
};

function getDomain(url){ try{return new URL(url).hostname.replace('www.','')}catch{return url} }
function getEmoji(url){
  const d = getDomain(url);
  for(const [k,v] of Object.entries(domainEmojis)) if(d.includes(k)) return v;
  return null;
}
function getPalette(url){
  const idx = url.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % palettes.length;
  return palettes[idx];
}

window.onload = async () => {
  const parts = parseJwt(token);
  const email = parts.sub || '';
  document.getElementById('user-avatar').textContent = email ? email[0].toUpperCase() : '?';
  await loadLinks();
};

function parseJwt(t){ try{return JSON.parse(atob(t.split('.')[1]))}catch{return {}} }

async function loadLinks() {
  try {
    const res = await fetch(`${API}/links/`, {headers:{Authorization:`Bearer ${token}`}});
    if(res.status===401){ signOut(); return; }
    allLinks = await res.json();
    renderLinks(allLinks);
  } catch { toast('Failed to load links','err'); }
}

function renderLinks(links) {
  const grid = document.getElementById('grid');
  const sub  = document.getElementById('subtitle');
  const cnt  = document.getElementById('link-count');

  if(!links.length){
    sub.textContent = 'No links saved yet';
    cnt.style.display = 'none';
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-emoji">🔗</div>
        <h3>Your vault is empty</h3>
        <p>Paste a URL to save your first link and start building your collection</p>
        <button class="empty-btn" onclick="openModal()">+ Save your first link</button>
      </div>`;
    return;
  }

  sub.textContent = `${links.length} link${links.length!==1?'s':''} saved`;
  cnt.textContent = links.length;
  cnt.style.display = 'inline-block';

  grid.innerHTML = links.map(l => {
    const p = getPalette(l.url);
    const emojiOverride = getEmoji(l.url);
    const emoji = emojiOverride || p.emoji;
    return `
    <div class="link-card" data-id="${l.id}">
      <div class="card-banner" style="background:${p.bg}">${emoji}</div>
      <div class="card-body">
        <div class="card-name">${l.name || getDomain(l.url)}</div>
        <div class="card-url">${getDomain(l.url)}</div>
        <div class="card-note">${l.note || ''}</div>
      </div>
      <div class="card-actions">
        <button class="ca-btn" onclick="openURL('${escHtml(l.url)}')" title="Open">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open
        </button>
        <button class="ca-btn" onclick="copyURL(${l.id})" title="Copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="ca-btn" onclick="openEdit(${l.id})" title="Edit">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
        <button class="ca-btn del" onclick="deleteLink(${l.id})" title="Delete">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){ return s.replace(/'/g,"\\'") }

let searchTimer;
async function onSearch() {
  const q = document.getElementById('search-input').value.trim();
  clearTimeout(searchTimer);
  if(!q){ renderLinks(allLinks); return; }
  searchTimer = setTimeout(async () => {
    try {
      const res = await fetch(`${API}/links/search?name=${encodeURIComponent(q)}`,{headers:{Authorization:`Bearer ${token}`}});
      renderLinks(res.status===404 ? [] : await res.json());
    } catch { renderLinks([]); }
  }, 280);
}

function openModal(prefillUrl='') {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Save a link';
  document.getElementById('m-url').value = prefillUrl;
  document.getElementById('m-name').value = '';
  document.getElementById('m-note').value = '';
  clearModalAlert();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-url').focus(),50);
}

function openEdit(id) {
  const l = allLinks.find(x=>x.id===id);
  if(!l) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit link';
  document.getElementById('m-url').value = l.url;
  document.getElementById('m-name').value = l.name||'';
  document.getElementById('m-note').value = l.note||'';
  clearModalAlert();
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function clearModalAlert(){
  const el = document.getElementById('modal-alert');
  el.className='modal-alert';el.textContent='';
}
function showModalAlert(msg){
  const el = document.getElementById('modal-alert');
  el.textContent=msg;el.className='modal-alert error';
}

async function saveLink() {
  clearModalAlert();
  const url  = document.getElementById('m-url').value.trim();
  const name = document.getElementById('m-name').value.trim();
  const note = document.getElementById('m-note').value.trim();
  if(!url) return showModalAlert('URL is required.');

  const btn = document.getElementById('btn-save');
  btn._t = btn.innerHTML; btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;

  try {
    const body = JSON.stringify({url, name:name||null, note:note||null});
    const headers = {'Content-Type':'application/json', Authorization:`Bearer ${token}`};
    const res = editingId
      ? await fetch(`${API}/links/${editingId}`, {method:'PUT', headers, body})
      : await fetch(`${API}/links/`,              {method:'POST', headers, body});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail||'Failed');
    closeModal();
    await loadLinks();
    toast(editingId ? 'Link updated ✓' : 'Link saved ✓', 'ok');
  } catch(e) { showModalAlert(e.message); }
  finally { btn.innerHTML=btn._t; btn.disabled=false; }
}

function openURL(url){ window.open(url,'_blank','noopener') }

async function copyURL(id) {
  try {
    const res = await fetch(`${API}/links/${id}/copy`,{headers:{Authorization:`Bearer ${token}`}});
    const data = await res.json();
    await navigator.clipboard.writeText(data.url);
    toast('URL copied to clipboard','ok');
  } catch { toast('Failed to copy','err'); }
}

async function deleteLink(id) {
  if(!confirm('Delete this link?')) return;
  try {
    const res = await fetch(`${API}/links/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
    if(!res.ok) throw new Error();
    await loadLinks();
    toast('Link deleted','ok');
  } catch { toast('Failed to delete','err'); }
}

function signOut(){
  localStorage.removeItem('ls_token');
  location.href = 'auth.html';
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.className = `toast ${type}`;
  el.innerHTML = `${type==='ok'?'✓':'✕'} ${msg}`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3000);
}

// close overlay on bg click
document.getElementById('overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('overlay')) closeModal();
});
</script>
</body>
</html>
