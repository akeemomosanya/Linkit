<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Linkit — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Epilogue:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--bg2:#0b0e1a;--bg3:#10142b;
  --surface:rgba(255,255,255,0.04);--surface-h:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#4f6ef7;--accent2:#a78bfa;--accent3:#22d3a5;
  --text:#eef0ff;--text2:#8892b0;--text3:#3d4a6b;
  --danger:#ff5c7c;--r:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;font-size:15px;line-height:1.6}
body::after{content:'';position:fixed;inset:0;opacity:.5}
.page{min-height:100vh;display:flex;flex-direction:column}
.card{width:100%;max-width:430px;margin:auto;background:var(--bg2);padding:2rem;border-radius:20px}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;cursor:pointer}
</style>
</head>

<body>
<div class="page">

<div class="card">

<div class="tabs">
  <button onclick="switchTab('login')" id="tab-login">Sign in</button>
  <button onclick="switchTab('register')" id="tab-register">Create account</button>
</div>

<!-- LOGIN -->
<div id="form-login">
  <input id="login-email" placeholder="Email" />
  <input id="login-password" type="password" placeholder="Password" />
  <button id="btn-login" onclick="doLogin()">Sign in</button>
</div>

<!-- REGISTER -->
<div id="form-register" style="display:none">
  <input id="reg-first" placeholder="First name" />
  <input id="reg-last" placeholder="Last name" />
  <input id="reg-email" placeholder="Email" />
  <input id="reg-password" type="password" placeholder="Password" />
  <button id="btn-register" onclick="doRegister()">Create account</button>
</div>

</div>
</div>

<script>

const API = 'https://linkit-1-4xd8.onrender.com';

function switchTab(tab){
  document.getElementById('form-login').style.display = tab==='login'?'block':'none';
  document.getElementById('form-register').style.display = tab==='register'?'block':'none';
}

async function doLogin(){
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  const body = new URLSearchParams({
    username: email,
    password: password
  });

  const res = await fetch(`${API}/auth/token`, {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body
  });

  const data = await res.json();

  if(res.ok){
    localStorage.setItem('ls_token', data.access_token);
    location.href = 'links.html';
  } else {
    alert(data.detail || 'Login failed');
  }
}

async function doRegister(){
  const first_name = document.getElementById('reg-first').value;
  const last_name  = document.getElementById('reg-last').value;
  const email      = document.getElementById('reg-email').value;
  const password   = document.getElementById('reg-password').value;

  const res = await fetch(`${API}/auth/`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email,first_name,last_name,password})
  });

  const data = await res.json();

  if(res.ok){
    alert('Account created! Please login.');
    switchTab('login');
  } else {
    alert(data.detail || 'Registration failed');
  }
}

</script>

</body>
</html>
